services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  system:
    build:
      context: ./system
      dockerfile: Dockerfile-dev
    container_name: system-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/devdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/8080 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./system:/app

  channel:
    build:
      context: ./channel
      dockerfile: Dockerfile-dev
    container_name: channel-service
    ports:
      - "8081:8080"
    environment:
      SYSTEM_URL: http://system:8080
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_AUTOCONFIGURE_EXCLUDE:
        org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
    depends_on:
      system:
        condition: service_started
    volumes:
      - ./channel:/app

  front:
    build:
      context: ./front
      dockerfile: Dockerfile-dev
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true